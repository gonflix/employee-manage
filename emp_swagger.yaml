openapi: 3.0.3
info:
  title: Employee Management REST API
  version: 1.0.0
  description: |
    Go 기반 사내 직원 관리 시스템 API 명세입니다.
    성공 응답은 `timestamp`, `code`, `message`를 포함합니다. 실패 응답은 퇴사자 차단 응답만 `code`를 포함합니다.
    퇴사 처리된 직원은 서버 인메모리 블랙리스트에 적재되며, 모든 인증/직원 요청에서 즉시 401 응답으로 차단됩니다.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Employee Auth
    description: 직원 인증
  - name: Employee
    description: 직원용 내 정보 API
  - name: Admin Auth
    description: 관리자 인증
  - name: Admin Employees
    description: 관리자 직원 관리 API
paths:
  /api/v1/employee/auth/login:
    post:
      tags:
        - Employee Auth
      summary: 직원 로그인
      operationId: loginEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          description: 인증 실패 또는 퇴사자 차단
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
  /api/v1/employee/me:
    get:
      tags:
        - Employee
      summary: 직원 본인 인적사항 조회
      operationId: getMyEmployeeProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfileResponse'
        '401':
          description: 인증 실패 또는 블랙리스트 차단
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
    patch:
      tags:
        - Employee
      summary: 직원 본인 인적사항 수정
      operationId: updateMyEmployeeProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMyProfileRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfileResponse'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestErrorResponse'
        '401':
          description: 인증 실패 또는 블랙리스트 차단
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
  /api/v1/admin/auth/login:
    post:
      tags:
        - Admin Auth
      summary: 관리자 로그인
      operationId: loginAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
  /api/v1/admin/employees:
    get:
      tags:
        - Admin Employees
      summary: 전체 직원 목록 조회
      operationId: listEmployees
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EmploymentStatus'
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: 이름, 사번, 이메일 검색어
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
    post:
      tags:
        - Admin Employees
      summary: 직원 계정 생성
      operationId: createEmployee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfileResponse'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestErrorResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '409':
          description: 사번, 이메일, 로그인 ID 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/v1/admin/employees/{employeeId}:
    get:
      tags:
        - Admin Employees
      summary: 직원 상세정보 조회
      description: |
        직원 기본 정보와 Background Check API에서 조회한 배경 정보를 함께 반환합니다.
        Background Check API 호출 실패 시 최대 3회 재시도합니다.
        재시도는 지수 백오프와 jitter를 적용하며, 503 응답의 `retryAfter` 값이 있으면 해당 시간만큼 대기 후 재시도합니다.
        3회 실패하면 500 응답을 반환합니다.
      operationId: getEmployeeDetail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDetailResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: 직원 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
        '500':
          description: Background Check API 최종 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
  /api/v1/admin/employees/{employeeId}/terminate:
    post:
      tags:
        - Admin Employees
      summary: 직원 퇴사 처리
      description: 퇴사 처리 시 계정을 TERMINATED 상태로 변경하고 인메모리 블랙리스트에 즉시 반영합니다.
      operationId: terminateEmployee
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateEmployeeRequest'
      responses:
        '200':
          description: 퇴사 처리 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeProfileResponse'
        '400':
          description: 잘못된 요청 또는 이미 퇴사 처리됨
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestErrorResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeUnauthorizedErrorResponse'
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenErrorResponse'
        '404':
          description: 직원 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EmployeeId:
      name: employeeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    SuccessResponse:
      type: object
      required:
        - timestamp
        - code
        - message
      properties:
        timestamp:
          type: string
          format: date-time
        code:
          type: string
        message:
          type: string
    ErrorResponseBase:
      type: object
      required:
        - timestamp
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2026-06-24T09:30:00+09:00'
        message:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    BadRequestErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponseBase'
        - type: object
          properties:
            message:
              type: string
              default: Invalid Request
              example: Invalid Request
    UnauthorizedErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponseBase'
        - type: object
          properties:
            message:
              type: string
              default: Authentication Failed
              example: Authentication Failed
    BlacklistedEmployeeErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponseBase'
        - type: object
          required:
            - code
          properties:
            code:
              type: string
              enum:
                - BLACKLISTED_EMPLOYEE
              example: BLACKLISTED_EMPLOYEE
            message:
              type: string
              example: 퇴사 처리된 직원은 접근할 수 없습니다.
    EmployeeUnauthorizedErrorResponse:
      oneOf:
        - $ref: '#/components/schemas/UnauthorizedErrorResponse'
        - $ref: '#/components/schemas/BlacklistedEmployeeErrorResponse'
    ForbiddenErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponseBase'
        - type: object
          properties:
            message:
              type: string
              default: Forbidden
              example: Forbidden
    GenericErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponseBase'
        - type: object
          properties:
            message:
              type: string
              default: Internal Server Error
              example: Internal Server Error
    FieldError:
      type: object
      properties:
        field:
          type: string
          example: email
        reason:
          type: string
          example: 올바른 이메일 형식이 아닙니다.
    LoginRequest:
      type: object
      required:
        - loginId
        - password
      properties:
        loginId:
          type: string
          minLength: 3
          maxLength: 80
          example: emp001
        password:
          type: string
          format: password
          minLength: 8
          example: Password123!
    AuthTokens:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: access token 만료 시간(초)
          example: 3600
    AuthSuccessResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/AuthTokens'
    EmploymentStatus:
      type: string
      enum:
        - EMPLOYED
        - TERMINATED
    EmployeeProfile:
      type: object
      required:
        - id
        - employeeNo
        - name
        - email
        - hireDate
        - employmentStatus
      properties:
        id:
          type: string
          format: uuid
        employeeNo:
          type: string
          example: EMP-2026-001
        name:
          type: string
          example: 홍길동
        email:
          type: string
          format: email
          example: gildong.hong@example.com
        phone:
          type: string
          example: '010-1234-5678'
        birthDate:
          type: string
          format: date
          example: '1990-01-01'
        address:
          type: string
          example: 서울특별시 강남구 테헤란로 1
        department:
          $ref: '#/components/schemas/Department'
        jobTitle:
          type: string
          example: Backend Engineer
        hireDate:
          type: string
          format: date
          example: '2026-01-01'
        terminationDate:
          type: string
          format: date
          nullable: true
        employmentStatus:
          $ref: '#/components/schemas/EmploymentStatus'
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: 개발팀
    EmployeeProfileResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/EmployeeProfile'
    UpdateMyProfileRequest:
      type: object
      properties:
        phone:
          type: string
          example: '010-9876-5432'
        address:
          type: string
          example: 경기도 성남시 분당구 판교역로 1
    CreateEmployeeRequest:
      type: object
      required:
        - employeeNo
        - loginId
        - password
        - name
        - email
        - hireDate
      properties:
        employeeNo:
          type: string
          example: EMP-2026-001
        loginId:
          type: string
          example: emp001
        password:
          type: string
          format: password
          minLength: 8
          example: TempPassword123!
        name:
          type: string
          example: 홍길동
        email:
          type: string
          format: email
          example: gildong.hong@example.com
        phone:
          type: string
          example: '010-1234-5678'
        birthDate:
          type: string
          format: date
        address:
          type: string
        departmentId:
          type: string
          format: uuid
        jobTitle:
          type: string
          example: Backend Engineer
        hireDate:
          type: string
          format: date
          example: '2026-01-01'
    TerminateEmployeeRequest:
      type: object
      required:
        - terminationDate
        - reason
      properties:
        terminationDate:
          type: string
          format: date
          example: '2026-06-24'
        reason:
          type: string
          example: 계약 종료
    EmployeeListResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - items
                - page
                - size
                - totalElements
                - totalPages
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/EmployeeProfile'
                page:
                  type: integer
                  example: 1
                size:
                  type: integer
                  example: 20
                totalElements:
                  type: integer
                  example: 125
                totalPages:
                  type: integer
                  example: 7
    EmployeeDetail:
      type: object
      required:
        - profile
        - backgroundCheck
      properties:
        profile:
          $ref: '#/components/schemas/EmployeeProfile'
        backgroundCheck:
          $ref: '#/components/schemas/BackgroundCheck'
    EmployeeDetailResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessResponse'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/EmployeeDetail'
    BackgroundCheck:
      type: object
      description: Background Check API 응답을 서버 표준 모델로 매핑한 정보
      properties:
        checkedAt:
          type: string
          format: date-time
        status:
          type: string
          example: CLEAR
        criminalRecord:
          type: boolean
          example: false
        employmentHistoryVerified:
          type: boolean
          example: true
        educationVerified:
          type: boolean
          example: true
        riskLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
          example: LOW
        raw:
          type: object
          additionalProperties: true
          description: 외부 API 원본 응답 중 필요한 확장 필드
